<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CircuLab.id App</title>
    <!-- Memanggil React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Memanggil Babel untuk menerjemahkan JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Memanggil Tailwind CSS langsung via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Memanggil Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Agar tampilan meniru ukuran HP di layar komputer */
        body {
            background-color: #111827; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        #root {
            width: 100%;
            max-width: 414px;
            background-color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        /* Menyembunyikan scrollbar tapi tetap bisa scroll */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DATA SIMULASI ---
        const PRODUK_MARKETPLACE = [
          { id: 1, nama: 'Tas Jinjing Kain Perca', harga: 'Rp 75.000', gambar: 'https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&q=80&w=200', kategori: 'Fashion' },
          { id: 2, nama: 'Pot Tanaman Daur Ulang', harga: 'Rp 45.000', gambar: 'https://images.unsplash.com/photo-1485955900006-10f4d324d411?auto=format&fit=crop&q=80&w=200', kategori: 'Rumah' },
          { id: 3, nama: 'Paving Block Plastik', harga: 'Rp 15.000/pc', gambar: 'https://images.unsplash.com/photo-1584839818828-568ea4658a8a?auto=format&fit=crop&q=80&w=200', kategori: 'Bangunan' },
          { id: 4, nama: 'Dompet Denim Bekas', harga: 'Rp 50.000', gambar: 'https://images.unsplash.com/photo-1628151015968-3cae74880bb6?auto=format&fit=crop&q=80&w=200', kategori: 'Fashion' },
        ];

        const RIWAYAT_TRANSAKSI = [
          { id: 1, tanggal: '12 Okt 2026', jenis: 'Kain Perca', berat: '15 Kg', status: 'Selesai Diproses' },
          { id: 2, tanggal: '05 Nov 2026', jenis: 'Plastik Kemasan', berat: '8 Kg', status: 'Sedang Dijemput' },
        ];

        // --- KOMPONEN BANTUAN UNTUK IKON ---
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const HeaderNavigasi = ({ judul, aksiKembali, ikonKanan }) => (
          <div className="bg-white px-4 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm border-b border-gray-100">
            <div className="flex items-center gap-3">
              {aksiKembali && (
                <button onClick={aksiKembali} className="p-1 rounded-full hover:bg-gray-100 text-gray-700 transition">
                  <Icon name="chevron-left" />
                </button>
              )}
              <h1 className="text-lg font-bold text-gray-800">{judul}</h1>
            </div>
            {ikonKanan && <div>{ikonKanan}</div>}
          </div>
        );

        // =====================================================================
        // HALAMAN REGISTRASI
        // =====================================================================
        const HalamanRegistrasi = ({ navigasiKe, setNamaBisnis }) => {
            const [inputNama, setInputNama] = useState('');
            
            // 👇👇👇 MASUKKAN LINK URL ATAU PATH GAMBAR LOGO ANDA DI BAWAH INI 👇👇👇
            const urlLogoAplikasi = "logo.png"; 
            // 👆👆👆 ========================================================= 👆👆👆

            const handleDaftar = (e) => {
                e.preventDefault();
                if(inputNama.trim() !== '') {
                    setNamaBisnis(inputNama);
                }
                navigasiKe('dashboard');
            };

            return (
                <div className="flex flex-col h-full bg-white px-6 py-10 justify-center">
                    <div className="flex justify-center mb-4">
                        {/* Tag ini menampilkan logo Anda menjadi bentuk bulat sempurna (rounded-full) */}
                        <img 
                            src={urlLogoAplikasi} 
                            alt="Logo CircuLab.id" 
                            className="h-24 w-24 object-cover rounded-full shadow-md border-2 border-green-100" 
                        />
                    </div>
                    <h1 className="text-3xl font-extrabold text-center text-green-700 mb-2 tracking-tight">CircuLab.id</h1>
                    <p className="text-center text-gray-500 mb-8 text-sm px-4">Ubah limbah usaha Anda menjadi produk bernilai tinggi dan dukung ekonomi sirkular.</p>

                    <form className="space-y-4" onSubmit={handleDaftar}>
                        <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">Nama Bisnis UMKM</label>
                            <input 
                                type="text" 
                                value={inputNama}
                                onChange={(e) => setInputNama(e.target.value)}
                                className="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-green-500 outline-none transition" 
                                placeholder="Contoh: Batik Sejahtera" 
                                required 
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">Kategori Usaha</label>
                            <select className="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-green-500 outline-none bg-white transition" required>
                                <option value="" disabled selected>Pilih Kategori...</option>
                                <option value="fashion">Fashion & Konveksi</option>
                                <option value="makanan">Makanan & Minuman</option>
                                <option value="kerajinan">Kerajinan Tangan</option>
                                <option value="lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">Email Bisnis</label>
                            <input type="email" className="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="email@bisnis.com" required />
                        </div>
                        <button type="submit" className="w-full bg-green-600 text-white font-bold rounded-xl p-4 mt-8 hover:bg-green-700 transition-colors shadow-md">
                            Daftar Sekarang
                        </button>
                    </form>
                    <div className="mt-8 text-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <span className="text-sm text-gray-600">Sudah memiliki akun? </span>
                        <button onClick={() => navigasiKe('dashboard')} className="text-sm text-green-700 font-bold hover:underline">Masuk</button>
                    </div>
                </div>
            );
        };

        // =====================================================================
        // HALAMAN PROFIL AKUN
        // =====================================================================
        const HalamanProfil = ({ navigasiKe, fotoProfil, setFotoProfil, namaBisnis, setNamaBisnis }) => {
          const fileInputRef = useRef(null);

          const handleFileChange = (event) => {
            const file = event.target.files[0];
            if (file) {
              const imageUrl = URL.createObjectURL(file);
              setFotoProfil(imageUrl);
            }
          };

          return (
            <div className="flex flex-col h-full bg-gray-50 pb-20 overflow-y-auto">
              <HeaderNavigasi judul="Profil Akun" aksiKembali={() => navigasiKe('dashboard')} />
              
              <div className="p-6">
                <div className="flex justify-center mb-6 relative">
                  <div className="w-28 h-28 bg-white rounded-full flex items-center justify-center text-green-700 font-bold text-4xl shadow-md border-4 border-green-50 relative overflow-hidden">
                    {fotoProfil ? (
                      <img src={fotoProfil} alt="Profil" className="w-full h-full object-cover" />
                    ) : (
                      namaBisnis.charAt(0).toUpperCase()
                    )}
                  </div>
                  <input 
                    type="file" 
                    accept="image/*" 
                    ref={fileInputRef} 
                    onChange={handleFileChange} 
                    className="hidden" 
                  />
                  <button 
                    onClick={() => fileInputRef.current.click()}
                    className="absolute bottom-0 right-1/2 transform translate-x-10 translate-y-2 bg-green-600 text-white p-2.5 rounded-full shadow-lg border-2 border-white hover:bg-green-700 transition active:scale-95"
                  >
                    <Icon name="camera" size={18} />
                  </button>
                </div>

                <h2 className="text-2xl font-bold text-center text-gray-800 mb-8">{namaBisnis}</h2>

                <div className="space-y-4">
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 focus-within:ring-2 ring-green-500 transition">
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Nama Bisnis UMKM</label>
                    <input 
                        type="text" 
                        value={namaBisnis} 
                        onChange={(e) => setNamaBisnis(e.target.value)} 
                        className="w-full text-sm font-bold text-gray-800 focus:outline-none bg-transparent" 
                    />
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 focus-within:ring-2 ring-green-500 transition">
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Kategori Usaha</label>
                    <select className="w-full text-sm font-bold text-gray-800 focus:outline-none bg-transparent outline-none appearance-none">
                      <option value="fashion">Fashion & Konveksi</option>
                      <option value="makanan">Makanan & Minuman</option>
                      <option value="kerajinan">Kerajinan Tangan</option>
                      <option value="lainnya">Lainnya</option>
                    </select>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 focus-within:ring-2 ring-green-500 transition">
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Email Terdaftar</label>
                    <input type="email" defaultValue="kontak@bisnis.com" className="w-full text-sm font-bold text-gray-800 focus:outline-none bg-transparent" />
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 focus-within:ring-2 ring-green-500 transition">
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Nomor WhatsApp</label>
                    <input type="tel" defaultValue="+62 812 3456 7890" className="w-full text-sm font-bold text-gray-800 focus:outline-none bg-transparent" />
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 focus-within:ring-2 ring-green-500 transition">
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Alamat Operasional</label>
                    <textarea defaultValue="Jl. Industri Kreatif No. 45, Komplek Sentra UMKM, Kota Semarang" className="w-full text-sm font-medium text-gray-800 focus:outline-none resize-none h-20 bg-transparent"></textarea>
                  </div>
                </div>

                <button 
                  onClick={() => { alert('Profil berhasil diperbarui!'); navigasiKe('dashboard'); }}
                  className="w-full bg-green-600 text-white font-bold rounded-xl p-4 mt-8 hover:bg-green-700 transition shadow-md flex justify-center items-center gap-2"
                >
                  <Icon name="save" size={20} /> Simpan Perubahan
                </button>
                <button 
                  onClick={() => navigasiKe('registrasi')} 
                  className="w-full bg-red-50 text-red-600 font-bold rounded-xl p-4 mt-4 hover:bg-red-100 transition border border-red-100 flex justify-center items-center gap-2"
                >
                  <Icon name="log-out" size={20} /> Keluar Akun
                </button>
              </div>
            </div>
          );
        };

        // =====================================================================
        // HALAMAN BERANDA
        // =====================================================================
        const HalamanBeranda = ({ navigasiKe, fotoProfil, namaBisnis }) => (
          <div className="flex flex-col h-full bg-gray-50 pb-20 overflow-y-auto relative">
            <div className="bg-gradient-to-br from-green-600 to-green-800 px-6 pt-12 pb-8 rounded-b-3xl text-white shadow-lg relative overflow-hidden">
              <div className="absolute top-4 right-4 text-white opacity-10"><Icon name="leaf" size={120} /></div>
              <div 
                className="flex justify-between items-center mb-6 relative z-10 cursor-pointer group"
                onClick={() => navigasiKe('profil')}
              >
                <div>
                  <p className="text-sm text-green-100 font-medium group-hover:text-white transition">Selamat datang kembali,</p>
                  <h2 className="text-2xl font-bold flex items-center gap-2 group-hover:text-green-50 transition">
                    {namaBisnis} <Icon name="chevron-right" size={20} className="text-green-300 opacity-80 group-hover:opacity-100" />
                  </h2>
                </div>
                <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-green-700 font-bold shadow-md text-lg border-2 border-transparent group-hover:border-green-200 transition overflow-hidden">
                    {fotoProfil ? <img src={fotoProfil} alt="Profil" className="w-full h-full object-cover" /> : namaBisnis.charAt(0).toUpperCase()}
                </div>
              </div>
              <div className="bg-white rounded-2xl p-5 flex items-center justify-between shadow-xl relative z-10">
                <div>
                  <p className="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Total Limbah Terkelola</p>
                  <div className="flex items-baseline gap-1">
                    <span className="text-4xl font-black text-green-600">125</span>
                    <span className="text-sm font-bold text-gray-500">Kg</span>
                  </div>
                </div>
                <div className="bg-green-50 p-4 rounded-full border border-green-100">
                  <Icon name="recycle" size={36} className="text-green-500" />
                </div>
              </div>
            </div>
            
            <div className="px-6 py-6">
              <h3 className="font-bold text-gray-800 mb-4 text-lg">Akses Cepat</h3>
              <div className="grid grid-cols-3 gap-4">
                <button onClick={() => navigasiKe('setorLimbah')} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center gap-3 hover:shadow-md transition">
                  <div className="bg-green-100 p-3 rounded-full text-green-600"><Icon name="upload" /></div>
                  <span className="text-xs font-bold text-gray-700 text-center">Setor Limbah</span>
                </button>
                <button onClick={() => navigasiKe('pelacakan')} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center gap-3 hover:shadow-md transition">
                  <div className="bg-blue-100 p-3 rounded-full text-blue-600"><Icon name="map-pin" /></div>
                  <span className="text-xs font-bold text-gray-700 text-center">Lacak Status</span>
                </button>
                <button onClick={() => navigasiKe('laporan')} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center gap-3 hover:shadow-md transition">
                  <div className="bg-orange-100 p-3 rounded-full text-orange-600"><Icon name="bar-chart-2" /></div>
                  <span className="text-xs font-bold text-gray-700 text-center">Laporan</span>
                </button>
              </div>
            </div>

            <div className="px-6 mb-6">
              <h3 className="font-bold text-gray-800 text-lg mb-4">Aktivitas Terakhir</h3>
              <div className="space-y-3">
                {RIWAYAT_TRANSAKSI.map(item => (
                  <div key={item.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex justify-between items-center cursor-pointer" onClick={() => navigasiKe('pelacakan')}>
                    <div className="flex items-center gap-4">
                      <div className="bg-gray-100 p-3 rounded-xl"><Icon name="package" className="text-gray-600" size={20}/></div>
                      <div>
                        <h4 className="font-bold text-sm text-gray-800">{item.jenis}</h4>
                        <p className="text-xs text-gray-500 font-medium">{item.tanggal} • {item.berat}</p>
                      </div>
                    </div>
                    <span className={`text-[10px] px-3 py-1.5 rounded-full font-bold ${item.status.includes('Selesai') ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                      {item.status}
                    </span>
                  </div>
                ))}
              </div>
            </div>

            <button 
              onClick={() => navigasiKe('ai')} 
              className="fixed bottom-24 right-4 sm:absolute sm:bottom-24 sm:right-6 bg-gradient-to-r from-emerald-400 to-green-600 text-white p-4 rounded-full shadow-[0_4px_15px_rgba(16,185,129,0.5)] hover:scale-105 transition-transform z-30 flex items-center justify-center animate-bounce"
            >
              <Icon name="bot" size={28} />
            </button>
          </div>
        );

        // =====================================================================
        // HALAMAN AI KAMERA (CHAT UI + KAMERA INTEGRASI + ATTACHMENT)
        // =====================================================================
        const HalamanAI = ({ navigasiKe }) => {
          const [pesanChat, setPesanChat] = useState([
            { id: 1, sender: 'bot', text: 'Halo! Saya CircuBot. Silakan foto limbah Anda, lalu tanyakan kepada saya limbah tersebut cocok dijadikan produk apa!' }
          ]);
          const [inputTeks, setInputTeks] = useState('');
          const [gambarTerlampir, setGambarTerlampir] = useState(null); // State baru untuk menyimpan foto sementara
          const [modeKamera, setModeKamera] = useState(false);
          const [isTyping, setIsTyping] = useState(false);
          const [kameraError, setKameraError] = useState(false);

          const videoRef = useRef(null);
          const streamRef = useRef(null);
          const chatEndRef = useRef(null);

          // Auto-scroll ke bawah saat ada pesan baru
          useEffect(() => {
            chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
          }, [pesanChat, isTyping, gambarTerlampir]);

          // Buka Kamera
          const bukaKamera = async () => {
            setModeKamera(true);
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
              });
              streamRef.current = stream;
              if (videoRef.current) {
                videoRef.current.srcObject = stream;
              }
              setKameraError(false);
            } catch (err) {
              console.error("Gagal mengakses kamera: ", err);
              setKameraError(true);
            }
          };

          // Tutup Kamera
          const tutupKamera = () => {
            if (streamRef.current) {
              streamRef.current.getTracks().forEach(track => track.stop());
            }
            setModeKamera(false);
          };

          // Ambil Foto dari Video & Lampirkan (TIDAK langsung dikirim)
          const ambilFoto = () => {
            if (videoRef.current) {
              const canvas = document.createElement('canvas');
              canvas.width = videoRef.current.videoWidth;
              canvas.height = videoRef.current.videoHeight;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
              
              // Ubah ke format gambar base64
              const imageUrl = canvas.toDataURL('image/png');
              
              tutupKamera();
              setGambarTerlampir(imageUrl); // Simpan foto sebagai lampiran sementara
            }
          };

          // Logika Mengirim Pesan & Balasan AI
          const kirimPesan = () => {
            if (!inputTeks.trim() && !gambarTerlampir) return;

            const teksDikirim = inputTeks;
            const gambarDikirim = gambarTerlampir;

            // Tambahkan pesan user ke chat
            const pesanBaru = { id: Date.now(), sender: 'user', text: teksDikirim, image: gambarDikirim };
            setPesanChat(prev => [...prev, pesanBaru]);
            
            // Bersihkan input dan lampiran
            setInputTeks('');
            setGambarTerlampir(null);
            setIsTyping(true);

            // Simulasi AI memproses dan membalas
            setTimeout(() => {
              let balasan = "";
              const tanya = teksDikirim.toLowerCase();

              if (gambarDikirim) {
                // Jika user mengirim gambar
                if (tanya.includes("jadikan") || tanya.includes("buat") || tanya.includes("apa")) {
                  balasan = "Berdasarkan gambar, saya mendeteksi ini adalah limbah kain perca. Limbah ini sangat bagus diolah menjadi tas jinjing, dompet denim, atau keset estetik. Potensi harga jualnya berkisar Rp 50.000 - Rp 75.000 di Pasar Daur Ulang CircuLab.id!";
                } else if (tanya.includes("jual") || tanya.includes("harga")) {
                   balasan = "Limbah kain perca seperti di gambar bisa Anda setorkan ke mitra kami. Anda bisa menghemat biaya pembuangan, dan bahkan mendapatkan poin *Reward* yang bisa ditukar dengan uang tunai jika volumenya besar.";
                } else {
                  balasan = "Saya telah memproses gambar limbah tersebut. Silakan tanyakan sesuatu, misalnya: 'Bisa dijadikan apa limbah ini?'";
                }
              } else {
                // Jika user hanya mengirim teks tanpa gambar
                if (tanya.includes("plastik")) {
                  balasan = "Plastik kemasan bisa dicacah dan dilebur menjadi pot tanaman daur ulang atau paving block ringan.";
                } else if (tanya.includes("kardus") || tanya.includes("kertas")) {
                  balasan = "Kardus bekas bisa dijadikan bahan pengemasan produk (*packaging*) yang estetik, atau disetor langsung untuk diolah menjadi pulp kertas.";
                } else {
                  balasan = "Itu ide yang menarik! Untuk hasil yang lebih akurat, coba klik ikon kamera dan fotokan limbah Anda kepada saya.";
                }
              }

              setPesanChat(prev => [...prev, { id: Date.now() + 1, sender: 'bot', text: balasan }]);
              setIsTyping(false);
            }, 2000); // Jeda 2 detik agar terasa seperti AI sedang "berpikir"
          };

          // Membersihkan kamera jika komponen ditutup tiba-tiba
          useEffect(() => {
            return () => {
              if (streamRef.current) {
                streamRef.current.getTracks().forEach(track => track.stop());
              }
            };
          }, []);

          return (
            <div className="flex flex-col h-full bg-gray-50 pb-safe">
              <HeaderNavigasi judul="CircuBot AI" aksiKembali={() => navigasiKe('dashboard')} />

              {!modeKamera ? (
                /* RUANG OBROLAN (CHAT INTERFACE) */
                <div className="flex flex-col flex-1 h-full overflow-hidden relative">
                  <div className="flex-1 p-4 overflow-y-auto space-y-4 pb-20">
                    {pesanChat.map((p) => (
                      <div key={p.id} className={`flex ${p.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[80%] p-3 rounded-2xl shadow-sm ${p.sender === 'user' ? 'bg-green-600 text-white rounded-br-none' : 'bg-white border border-gray-200 text-gray-800 rounded-bl-none'}`}>
                          {p.image && <img src={p.image} className="w-full rounded-xl mb-2 object-cover" alt="Foto Limbah" />}
                          {p.text && <p className="text-sm leading-relaxed">{p.text}</p>}
                        </div>
                      </div>
                    ))}
                    
                    {/* Animasi Mengetik AI */}
                    {isTyping && (
                      <div className="flex justify-start">
                        <div className="bg-white border border-gray-200 p-4 rounded-2xl rounded-bl-none shadow-sm flex gap-1.5 items-center">
                          <div className="w-2 h-2 bg-green-500 rounded-full animate-bounce"></div>
                          <div className="w-2 h-2 bg-green-500 rounded-full animate-bounce" style={{animationDelay: '0.15s'}}></div>

              {!sembunyikanMenuBawah && (
                <div className="absolute bottom-0 w-full bg-white border-t border-gray-200 px-2 pt-2 pb-4 flex justify-around items-end z-20">
                  {menuBawah.map((item) => (
                    <button 
                      key={item.id} 
                      onClick={() => gantiHalaman(item.id)}
                      className={`flex flex-col items-center p-2 w-16 transition-colors ${halamanAktif === item.id || (halamanAktif==='detailProduk' && item.id==='marketplace') ? 'text-green-600' : 'text-gray-400'}`}
                    >
                      {item.spesial ? (
                        <div className="bg-green-600 text-white p-3.5 rounded-full shadow-lg transform -translate-y-5 border-4 border-white">
                          <Icon name={item.ikon} size={26} />
                        </div>
                      ) : (
                         <Icon name={item.ikon} size={24} />
                      )}
                      <span className={`text-[10px] mt-1 ${item.spesial ? 'mt-0 font-bold text-green-700' : 'font-semibold'}`}>
                        {item.label}
                      </span>
                    </button>
                  ))}
                </div>
              )}
            </React.Fragment>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
